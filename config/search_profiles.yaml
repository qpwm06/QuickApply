app:
  database_url: sqlite:///data/jobs.db
  refresh_interval_minutes: 720
  default_limit: 60
  default_min_score: 0
  min_score_to_store: 18
  proxy_file: config/proxies.local.txt
  workspaces_dir: data/workspaces
  codex_timeout_seconds: 1200
resume_profile:
  name: Alex Morgan
  summary: Simulation-first computational scientist bridging molecular simulation,
    computational chemistry, materials informatics, and scientific machine learning
    for molecules, soft materials, and biomolecular systems.
  source_files:
  - examples/resumes/alex_morgan_general.tex
  - examples/resumes/alex_morgan_comp_chem.tex
  - examples/resumes/alex_morgan_materials_ml.tex
  - examples/resumes/alex_morgan_protein_ml.tex
  target_titles:
  - Computational Scientist
  - Computational Chemist
  - Molecular Modeling Scientist
  - Computational Chemistry Scientist
  - Computational Materials Scientist
  - Research Scientist, Computational Chemistry
  - Scientific ML Scientist
  - Computational Biologist
  # 新增职位名称变体
  - Simulation Scientist
  - Molecular Simulation Scientist
  - Research Scientist, Molecular Simulation
  - Computational Researcher
  - Senior Scientist, Computational Chemistry
  - Staff Scientist, Computational Chemistry
  - Scientist, Molecular Design
  - Materials Informatics Scientist
  focus_domains:
  - molecular simulation
  - molecular modeling
  - computational chemistry
  - small-molecule crystallization
  - scientific machine learning
  - computational materials
  - soft matter simulation
  - protein modeling
  - biomolecular condensates
  # 新增细分领域
  - materials informatics
  - drug discovery
  - force field development
  - free energy calculations
  - crystal engineering
  - polymer simulation
  - nanoparticle self-assembly
  weighted_keywords:
    # 核心差异化 — molecular simulation + computational chemistry
    molecular dynamics: 1.8
    computational chemistry: 1.7
    molecular modeling: 1.6
    force field development: 1.6
    coarse-grained: 1.5
    enhanced sampling: 1.5
    free energy: 1.5
    crystallization: 1.4
    computational scientist: 1.3
    # 工具差异化 — 改过源码或深度使用的
    LAMMPS: 1.4
    HOOMD: 1.4
    PLUMED: 1.3
    CP2K: 1.2
    ORCA: 1.2
    DFT: 1.2
    # ML 相关 — 有实力但非核心差异化
    machine learning potentials: 1.3
    scientific machine learning: 1.2
    protein modeling: 1.2
    graph neural networks: 1.1
    PyTorch: 1.0
    # 新增高信号词
    metadynamics: 1.3
    nucleation: 1.2
    crystal growth: 1.2
    soft matter: 1.2
    cheminformatics: 1.1
    Bayesian optimization: 1.0
    Chemprop: 1.0
  stop_keywords:
  - sales
  - account executive
  - recruiter
  - director of business development
  # 新增过滤词
  - marketing manager
  - customer success
  - business analyst
  - financial analyst
  - clinical research
  - regulatory affairs
  - quality assurance
  - manufacturing engineer
search_profiles:
# -- Scientific ML 方向 --
- slug: scientific-ml
  label: Simulation Science + Scientific ML
  enabled: true
  default_resume_file: examples/resumes/alex_morgan_materials_ml.tex
  search_terms:
  - '"computational scientist" molecular simulation'
  - '"machine learning" molecular modeling'
  - '"scientific machine learning" materials'
  - '"simulation scientist" machine learning'
  - '"molecular dynamics" simulation scientist'
  search_term_weights:
    '"computational scientist" molecular simulation': 0.85
    '"machine learning" molecular modeling': 0.82
    '"scientific machine learning" materials': 0.58
    '"simulation scientist" machine learning': 0.64
    '"molecular dynamics" simulation scientist': 0.88
  locations:
  - United States
  sites:
  - indeed
  - linkedin
  - zip_recruiter
  results_wanted: 25
  hours_old: 168
  country_indeed: USA
  market_priority: 0.72
